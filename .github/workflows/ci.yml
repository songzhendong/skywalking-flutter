# Analyzer and unit tests.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Pub get
        run: dart pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test
