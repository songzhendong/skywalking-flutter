name: skywalking_flutter
description: OpenTelemetry OTLP/HTTP Flutter plugin for traces and metrics (SkyWalking OAP compatible).
version: 0.1.0
license: Apache-2.0

homepage: https://github.com/songzhendong/skywalking-flutter
repository: https://github.com/songzhendong/skywalking-flutter
issue_tracker: https://github.com/songzhendong/skywalking-flutter/issues
documentation: https://github.com/songzhendong/skywalking-flutter/blob/main/doc/USAGE.md

topics:
  - opentelemetry
  - otlp
  - skywalking
  - apm
  - tracing
  - metrics
  - flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  lints: ^5.0.0
  test: ^1.25.8

flutter:
  plugin:
    platforms:
      android:
        package: dev.skywalking.flutter
        pluginClass: SkywalkingFlutterPlugin
      ios:
        pluginClass: SkywalkingFlutterPlugin
