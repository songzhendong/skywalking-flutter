# skywalking_flutter OTLP metrics -> GENERAL layer (xt-open-app / smoke verify).
#
# Agent OTLP names use dots; OAP MAL uses underscores:
#   http.client.requests          -> http_client_requests
#   app.screen.views              -> app_screen_views
# Resource service.name -> label service_name (and job_name).

filter: "{ tags -> tags.service_name == 'xt-open-app' || tags.service_name == 'flutter-otlp-verify' }"
metricPrefix: meter_flutter
expSuffix: service(['service_name'], Layer.GENERAL)

metricsRules:
  # --- verify_otlp.dart smoke ---
  - name: verify_events_total
    exp: verify_events_total.sum(['service_name'])
  - name: verify_bootstrap_duration_avg_ms
    exp: verify_bootstrap_duration_sum.sum(['service_name']).safeDiv(verify_bootstrap_duration_count.sum(['service_name']))
  # --- HTTP (InstrumentedClient / verify simulated) ---
  - name: http_requests_total
    exp: http_client_requests.sum(['service_name'])
  - name: http_requests_rpm
    exp: http_client_requests.sum(['service_name']).rate('PT1M')
  - name: http_latency_avg_ms
    exp: http_client_request_duration_sum.sum(['service_name']).safeDiv(http_client_request_duration_count.sum(['service_name']))
  # --- App business counters (align with lib/monitoring + verify script) ---
  - name: screen_views_total
    exp: app_screen_views.sum(['service_name'])
  - name: lifecycle_events_total
    exp: app_lifecycle_events.sum(['service_name'])
  - name: session_start_total
    exp: app_session_start.sum(['service_name'])
  - name: auth_login_total
    exp: app_auth_login.sum(['service_name'])
  - name: feed_prefetch_total
    exp: app_feed_prefetch.sum(['service_name'])
  - name: video_play_total
    exp: app_video_play.sum(['service_name'])
  - name: search_total
    exp: app_search.sum(['service_name'])
  - name: exception_count_total
    exp: exception_count.sum(['service_name'])
  # --- App histograms (duration) ---
  - name: cold_start_duration_avg_ms
    exp: app_cold_start_duration_sum.sum(['service_name']).safeDiv(app_cold_start_duration_count.sum(['service_name']))
  - name: feed_prefetch_duration_avg_ms
    exp: app_feed_prefetch_duration_sum.sum(['service_name']).safeDiv(app_feed_prefetch_duration_count.sum(['service_name']))
  - name: video_duration_avg_ms
    exp: app_video_duration_sum.sum(['service_name']).safeDiv(app_video_duration_count.sum(['service_name']))
  - name: search_duration_avg_ms
    exp: app_search_duration_sum.sum(['service_name']).safeDiv(app_search_duration_count.sum(['service_name']))
